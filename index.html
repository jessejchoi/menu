<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu and Grocery Checklist</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #171512;
        --muted: #746d61;
        --line: #d8cfbd;
        --paper: #f5f0e6;
        --panel: #fffaf0;
        --accent: #8b6a2f;
        --accent-strong: #272118;
        --gold: #b9903d;
        --rose: #873f45;
        --olive: #3f4d3c;
        --shadow: 0 28px 70px rgba(23, 21, 18, 0.12);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(23, 21, 18, 0.035) 1px, transparent 1px),
          linear-gradient(180deg, #f9f5ec, var(--paper));
        background-size: 64px 64px, auto;
        color: var(--ink);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .masthead,
      .content {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
      }

      .masthead {
        padding: clamp(28px, 5vw, 48px) 0 20px;
        text-align: center;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .masthead-rule {
        width: min(480px, 82%);
        height: 1px;
        margin: 16px auto 0;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 8px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 500;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .masthead p {
        max-width: 520px;
        margin: 12px auto 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .content {
        flex: 1;
        padding-bottom: 64px;
      }

      .shell {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        overflow: clip;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 14px;
        align-items: center;
        padding: 18px clamp(18px, 4vw, 42px);
        border-bottom: 1px solid var(--line);
        background: #fbf7ed;
      }

      .tabs {
        display: inline-grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-column: 2;
        gap: 3px;
        padding: 4px;
        border: 1px solid #cdbd9a;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 253, 246, 0.94), rgba(242, 234, 214, 0.78));
        box-shadow:
          inset 0 0 0 1px rgba(255, 250, 240, 0.8),
          0 8px 18px rgba(23, 21, 18, 0.08);
        min-width: min(100%, 238px);
      }

      .tab {
        min-height: 32px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #7d715d;
        cursor: pointer;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        padding: 0 18px;
        text-transform: uppercase;
        transition:
          background 160ms ease,
          box-shadow 160ms ease,
          color 160ms ease;
      }

      .tab[aria-selected="true"] {
        color: #fffaf0;
        background:
          linear-gradient(180deg, #4d4435, #241f18);
        box-shadow:
          inset 0 0 0 1px rgba(185, 144, 61, 0.4),
          0 4px 10px rgba(39, 33, 24, 0.16);
      }

      .tab:hover {
        color: var(--accent-strong);
      }

      .tab[aria-selected="true"]:hover {
        color: #fffaf0;
      }

      .panels {
        padding: clamp(24px, 5vw, 58px);
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      #menu-panel,
      #grocery-panel {
        max-width: 920px;
        margin: 0 auto;
        padding: clamp(24px, 5vw, 48px);
        border: 1px solid var(--line);
        background:
          linear-gradient(90deg, rgba(185, 144, 61, 0.08), transparent 24%, transparent 76%, rgba(185, 144, 61, 0.08)),
          var(--panel);
        box-shadow: inset 0 0 0 9px #fbf3df;
      }

      .restaurant-menu {
        display: grid;
        gap: 42px;
      }

      .restaurant-menu .category {
        border: 0;
        border-radius: 0;
        background: transparent;
        overflow: visible;
      }

      .restaurant-menu .category h3 {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0;
        border: 0;
        color: #7c4f19;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.25rem, 2.5vw, 1.7rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-align: center;
      }

      .restaurant-menu .category h3::before,
      .restaurant-menu .category h3::after {
        content: "";
        height: 1px;
        flex: 1;
        background: #dcc99b;
      }

      .restaurant-menu .item-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 34px;
        padding: 18px 4px 0;
      }

      .restaurant-menu .menu-item {
        min-height: 0;
        align-items: flex-start;
        padding: 0 0 14px;
        border-bottom: 1px dotted #d9c8a0;
        border-radius: 0;
        color: #2e2a20;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.05rem, 2vw, 1.25rem);
        line-height: 1.25;
      }

      .restaurant-menu .menu-item::before {
        width: 6px;
        height: 6px;
        flex-basis: 6px;
        margin-top: 0.45em;
        background: #b88928;
      }

      .item-list {
        list-style: none;
        margin: 0;
        padding: 8px;
        display: grid;
        gap: 6px;
      }

      .menu-item,
      .check-item {
        min-height: 44px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 11px;
        border-radius: 0;
        color: var(--ink);
      }

      .menu-item::before {
        content: "";
        width: 9px;
        height: 9px;
        flex: 0 0 9px;
        border-radius: 50%;
        background: var(--gold);
      }

      .check-item {
        cursor: pointer;
      }

      .check-item:hover {
        background: #f6f0df;
      }

      .check-item input {
        appearance: none;
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        border: 1px solid #8f8777;
        border-radius: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .check-item input:checked {
        border-color: var(--olive);
        background: var(--olive);
      }

      .check-item input:checked::after {
        content: "";
        width: 10px;
        height: 6px;
        border-left: 2px solid #fff;
        border-bottom: 2px solid #fff;
        transform: rotate(-45deg) translate(1px, -1px);
      }

      .check-item span {
        transition: color 140ms ease, text-decoration-color 140ms ease;
      }

      .check-item input:checked + span {
        color: #7d8983;
        text-decoration: line-through;
        text-decoration-color: rgba(135, 63, 69, 0.65);
      }

      .restaurant-menu .grocery-row {
        min-height: 0;
      }

      .restaurant-menu .check-item {
        width: 100%;
        min-height: 0;
        align-items: flex-start;
        padding: 0 0 14px;
        border-bottom: 1px dotted #d9c8a0;
        border-radius: 0;
        color: #2e2a20;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.05rem, 2vw, 1.25rem);
        line-height: 1.25;
      }

      .restaurant-menu .check-item:hover {
        background: transparent;
        color: #7c4f19;
      }

      .restaurant-menu .check-item input {
        width: 18px;
        height: 18px;
        flex-basis: 18px;
        margin-top: 0.05em;
        border-color: #b88928;
        background: #fffdf6;
      }

      .restaurant-menu .check-item input:checked {
        border-color: var(--olive);
        background: var(--olive);
      }

      .empty,
      .error {
        border: 1px dashed var(--line);
        border-radius: 0;
        padding: 20px;
        color: var(--muted);
        background: #fffdf6;
      }

      .error {
        border-color: rgba(181, 91, 100, 0.45);
        color: #813d45;
      }

      @media (max-width: 680px) {
        .masthead,
        .content {
          width: min(100% - 24px, 1080px);
        }

        .toolbar {
          grid-template-columns: 1fr;
          padding: 16px;
        }

        .tabs {
          width: 100%;
        }

        .tabs {
          grid-column: 1;
          width: min(100%, 260px);
          justify-self: center;
        }

        #menu-panel,
        #grocery-panel {
          padding: 24px 16px;
          box-shadow: inset 0 0 0 5px #fbf3df;
        }

        .restaurant-menu .item-list {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .restaurant-menu .category h3 {
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="masthead" aria-label="Menu masthead">
        <p class="eyebrow">Private Kitchen</p>
        <h1>Menu & Market</h1>
        <p>A weekly dining card with a matching provisions list.</p>
        <div class="masthead-rule" aria-hidden="true"></div>
      </section>

      <section class="content">
        <div class="shell">
          <div class="toolbar">
            <div class="tabs" role="tablist" aria-label="Planner tabs">
              <button class="tab" id="menu-tab" type="button" role="tab" aria-selected="true" aria-controls="menu-panel" data-tab="menu">Menu</button>
              <button class="tab" id="grocery-tab" type="button" role="tab" aria-selected="false" aria-controls="grocery-panel" data-tab="grocery">Grocery</button>
            </div>
          </div>

          <div class="panels">
            <section class="panel active" id="menu-panel" role="tabpanel" aria-labelledby="menu-tab"></section>
            <section class="panel" id="grocery-panel" role="tabpanel" aria-labelledby="grocery-tab"></section>
          </div>
        </div>
      </section>
    </main>

    <script>
      const DATA_URL = "data/menu-data.json";
      const CHECKED_KEY = "menu-grocery-checked-items";

      const state = {
        activeTab: "menu",
        data: null,
        checked: readChecked(),
      };

      const tabs = Array.from(document.querySelectorAll(".tab"));
      const panels = {
        menu: document.querySelector("#menu-panel"),
        grocery: document.querySelector("#grocery-panel")
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          state.activeTab = tab.dataset.tab;
          syncTabs();
          render();
        });
      });

      scheduleDailyChecklistReset();
      loadData();

      async function loadData() {
        try {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Could not load ${DATA_URL}`);
          }
          state.data = await response.json();
          render();
        } catch (error) {
          renderError(error);
        }
      }

      function render() {
        if (!state.data) return;

        renderCollection("menu", state.data.menu, false);
        renderCollection("grocery", state.data.grocery, true);
      }

      function renderCollection(tabName, collection, isChecklist) {
        const panel = panels[tabName];
        const categories = filterCategories(collection.categories || []);

        panel.replaceChildren(
          categories.length ? gridFor(categories, isChecklist) : emptyFor()
        );
      }

      function filterCategories(categories) {
        return categories
          .map((category) => ({
            ...category,
            items: category.items || []
          }))
          .filter((category) => category.items.length);
      }

      function gridFor(categories, isChecklist) {
        const grid = document.createElement("div");
        grid.className = isChecklist ? "restaurant-menu grocery-menu" : "restaurant-menu";

        categories.forEach((category) => {
          const card = document.createElement("article");
          card.className = "category";

          const heading = document.createElement("h3");
          heading.textContent = category.name;

          const list = document.createElement("ul");
          list.className = "item-list";

          category.items.forEach((item) => {
            list.append(isChecklist ? groceryItemFor(item) : menuItemFor(item));
          });

          card.append(heading, list);
          grid.append(card);
        });

        return grid;
      }

      function menuItemFor(item) {
        const row = document.createElement("li");
        row.className = "menu-item";
        row.textContent = item.name;
        return row;
      }

      function groceryItemFor(item) {
        const row = document.createElement("li");
        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        const text = document.createElement("span");

        row.append(label);
        row.className = "grocery-row";
        label.className = "check-item";
        checkbox.type = "checkbox";
        checkbox.checked = Boolean(state.checked[item.id]);
        checkbox.addEventListener("change", () => {
          state.checked[item.id] = checkbox.checked;
          if (!checkbox.checked) {
            delete state.checked[item.id];
          }
          writeChecked(state.checked);
        });
        text.textContent = item.name;

        label.append(checkbox, text);
        return row;
      }

      function emptyFor() {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "No matching items.";
        return empty;
      }

      function renderError(error) {
        Object.values(panels).forEach((panel) => {
          const message = document.createElement("p");
          message.className = "error";
          message.textContent = `${error.message}. Start a local server from this folder so the browser can fetch the data file.`;
          panel.replaceChildren(message);
        });
      }

      function syncTabs() {
        tabs.forEach((tab) => {
          const isActive = tab.dataset.tab === state.activeTab;
          tab.setAttribute("aria-selected", String(isActive));
          tab.tabIndex = isActive ? 0 : -1;
        });

        Object.entries(panels).forEach(([name, panel]) => {
          panel.classList.toggle("active", name === state.activeTab);
        });
      }

      function readChecked() {
        try {
          const saved = JSON.parse(localStorage.getItem(CHECKED_KEY));

          if (!saved || saved.date !== todayKey()) {
            localStorage.removeItem(CHECKED_KEY);
            return {};
          }

          return saved.items || {};
        } catch {
          return {};
        }
      }

      function writeChecked(checked) {
        localStorage.setItem(CHECKED_KEY, JSON.stringify({
          date: todayKey(),
          items: checked
        }));
      }

      function todayKey() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function scheduleDailyChecklistReset() {
        const now = new Date();
        const midnight = new Date(now);

        midnight.setHours(24, 0, 0, 0);

        window.setTimeout(() => {
          state.checked = {};
          localStorage.removeItem(CHECKED_KEY);
          render();
          scheduleDailyChecklistReset();
        }, midnight.getTime() - now.getTime());
      }
    </script>
  </body>
</html>
